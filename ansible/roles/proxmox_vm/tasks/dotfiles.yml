---
# Dotfiles deployment via chezmoi
# Replaces the old stow-based workflow
# Requires: gather_facts: true in the calling playbook

- name: Set user home directory
  set_fact:
    user_home: "/home/{{ ansible_user }}"

- name: Check if chezmoi is already installed
  ansible.builtin.command: chezmoi --version
  become_user: "{{ ansible_user }}"
  register: chezmoi_check
  ignore_errors: yes
  changed_when: false

- name: Check if dotfiles are already applied
  ansible.builtin.stat:
    path: "{{ user_home }}/.local/share/chezmoi/.git"
  register: chezmoi_repo_check

- name: Setup dotfiles and SSH keys for user {{ ansible_user }}
  become_user: "{{ ansible_user }}"
  block:
    - name: Ensure .ssh directory exists
      file:
        path: "{{ user_home }}/.ssh"
        state: directory
        mode: '0700'

    - name: Clean up old host keys from localhost known_hosts
      shell: |
        ssh-keygen -R {{ ansible_host | default(inventory_hostname) }} || true
        ssh-keygen -R {{ inventory_hostname }} || true
        ssh-keygen -R {{ inventory_hostname.split('.')[0] }} || true
      delegate_to: localhost
      connection: local
      ignore_errors: yes
      changed_when: false

    - name: Test SSH connection to ensure host key is accepted
      shell: ssh -o BatchMode=yes -o StrictHostKeyChecking=no {{ ansible_user }}@{{ ansible_host | default(inventory_hostname) }} 'echo "SSH connection test successful"'
      delegate_to: localhost
      connection: local
      ignore_errors: yes

    - name: Rsync SSH files from localhost
      shell: cd {{ local_ssh_path }} && rsync -av {{ ssh_files_pattern }} {{ ansible_user }}@{{ ansible_host | default(inventory_hostname) }}:.ssh/
      delegate_to: localhost
      connection: local

    - name: Install chezmoi
      shell: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b {{ user_home }}/.local/bin
      args:
        creates: "{{ user_home }}/.local/bin/chezmoi"
      when: chezmoi_check.rc != 0

    - name: Initialize and apply dotfiles with chezmoi
      shell: |
        export PATH="{{ user_home }}/.local/bin:$PATH"
        chezmoi init --apply {{ dotfiles_repo }}
      args:
        creates: "{{ user_home }}/.local/share/chezmoi/.git"
      environment:
        PATH: "{{ user_home }}/.local/bin:{{ ansible_env.PATH | default('/usr/local/bin:/usr/bin:/bin') }}"
        HOME: "{{ user_home }}"
      async: 1200
      poll: 10
      when: not chezmoi_repo_check.stat.exists

    - name: Update dotfiles if already initialized
      shell: |
        export PATH="{{ user_home }}/.local/bin:$PATH"
        chezmoi update --force
      environment:
        PATH: "{{ user_home }}/.local/bin:{{ ansible_env.PATH | default('/usr/local/bin:/usr/bin:/bin') }}"
        HOME: "{{ user_home }}"
      when: chezmoi_repo_check.stat.exists
      changed_when: false
  when: setup_dotfiles

- name: Change shell to zsh
  user:
    name: "{{ ansible_user }}"
    shell: "{{ default_shell }}"
  retries: 3
  delay: 5
