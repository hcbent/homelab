---
# Dotfiles deployment via chezmoi
# Replaces the old stow-based workflow

- name: Check if chezmoi is already installed
  ansible.builtin.command: chezmoi --version
  become_user: "{{ ansible_user }}"
  register: chezmoi_check
  ignore_errors: yes
  changed_when: false

- name: Check if dotfiles are already applied
  ansible.builtin.stat:
    path: "{{ chezmoi_source_dir }}/.git"
  register: chezmoi_repo_check

- name: Setup dotfiles and SSH keys for user {{ ansible_user }}
  become_user: "{{ ansible_user }}"
  block:
    - name: Ensure .ssh directory exists
      file:
        path: ~/.ssh
        state: directory
        mode: '0700'

    - name: Clean up old host keys from localhost known_hosts
      shell: |
        ssh-keygen -R {{ inventory_hostname }} || true
        ssh-keygen -R {{ ansible_host | default(inventory_hostname) }} || true
        ssh-keygen -R {{ inventory_hostname.split('.')[0] }} || true
        sed -i.bak '/{{ inventory_hostname }}/d' ~/.ssh/known_hosts || true
        sed -i.bak '/{{ inventory_hostname.split('.')[0] }}/d' ~/.ssh/known_hosts || true
      delegate_to: localhost
      connection: local
      ignore_errors: yes

    - name: Test SSH connection to ensure host key is accepted
      shell: ssh -o BatchMode=yes -o StrictHostKeyChecking=no {{ ansible_user }}@{{ inventory_hostname }} 'echo "SSH connection test successful"'
      delegate_to: localhost
      connection: local
      ignore_errors: yes

    - name: Rsync SSH files from localhost
      shell: cd {{ local_ssh_path }} && rsync -av {{ ssh_files_pattern }} {{ ansible_user }}@{{ inventory_hostname }}:.ssh/
      delegate_to: localhost
      connection: local

    - name: Install chezmoi
      shell: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b ~/.local/bin
      args:
        creates: ~/.local/bin/chezmoi
      when: chezmoi_check.rc != 0

    - name: Ensure ~/.local/bin is in PATH for this session
      set_fact:
        ansible_env_path: "{{ ansible_env.HOME }}/.local/bin:{{ ansible_env.PATH | default('/usr/local/bin:/usr/bin:/bin') }}"

    - name: Initialize and apply dotfiles with chezmoi
      shell: |
        export PATH="{{ ansible_env_path }}"
        chezmoi init --apply {{ dotfiles_repo }}
      args:
        creates: "{{ chezmoi_source_dir }}/.git"
      environment:
        PATH: "{{ ansible_env_path }}"
      async: 1200
      poll: 10
      when: chezmoi_repo_check.stat.exists is not defined or not chezmoi_repo_check.stat.exists

    - name: Update dotfiles if already initialized
      shell: |
        export PATH="{{ ansible_env_path }}"
        chezmoi update --force
      environment:
        PATH: "{{ ansible_env_path }}"
      when: chezmoi_repo_check.stat.exists is defined and chezmoi_repo_check.stat.exists
  when: setup_dotfiles

- name: Change shell to zsh
  user:
    name: "{{ ansible_user }}"
    shell: "{{ default_shell }}"
  retries: 3
  delay: 5
